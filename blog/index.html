---
layout: null
title: Blog
permalink: /blog/
paginate: 6
---

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }} | Zir</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">

<style>
:root{
--yellow:#FFD500;--pink:#FF3CAC;--green:#29FF87;--blue:#3F6BFF;--orange:#FF7A00;--shadow:#000;--bg:#FFF6E9;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Space Grotesk',sans-serif;}
body{background:var(--bg);overflow-x:hidden;padding:30px 16px 120px;}
.container{max-width:1100px;margin:auto;width:100%;}
.section-title{font-size:40px;margin-bottom:30px;background:var(--orange);padding:16px 22px;border:8px solid #111;box-shadow:12px 12px 0 var(--shadow);transform:rotate(-2deg);display:inline-block;}
.search-box{width:100%;padding:14px 16px;margin-bottom:40px;border:6px solid #111;font-size:16px;font-weight:700;box-shadow:8px 8px 0 var(--shadow);outline:none;background:white;}
.blog-grid{display:grid;grid-template-columns:1fr;gap:30px;}
.blog-card{display:block;background:white;border:6px solid #111;box-shadow:10px 10px 0 var(--shadow);text-decoration:none;color:#111;overflow:hidden;transition:.2s;}
.blog-card:hover{transform:translate(-6px,-6px);box-shadow:16px 16px 0 var(--shadow);}
.blog-thumb{width:100%;height:180px;object-fit:cover;border-bottom:6px solid #111;}
.blog-content{padding:20px;}
.blog-card h2{font-size:24px;margin-bottom:10px;}
.date{font-size:13px;font-weight:700;margin-bottom:8px;}
.excerpt{font-size:15px;line-height:1.6;}
.pagination{margin-top:50px;display:flex;gap:10px;flex-wrap:wrap;}
.pagination a,.pagination span{padding:10px 16px;border:4px solid #111;background:white;font-weight:700;box-shadow:4px 4px 0 var(--shadow);text-decoration:none;color:#111;cursor:pointer;}
.pagination .current{background:var(--green);}
.floating{position:absolute;border:6px solid #111;box-shadow:6px 6px 0 var(--shadow);opacity:.35;}
.shape1{width:120px;height:120px;background:var(--green);top:10%;left:6%;}
.shape2{width:90px;height:90px;background:var(--pink);bottom:15%;right:8%;}
.shape3{width:100px;height:100px;background:var(--blue);top:50%;right:12%;}
.bottom-bar{position:fixed;bottom:0;left:0;width:100%;background:var(--yellow);border-top:6px solid #111;display:flex;justify-content:center;padding:10px;z-index:10;}
.bottom-bar button{background:var(--pink);border:4px solid #111;padding:10px 18px;font-weight:700;box-shadow:4px 4px 0 var(--shadow);cursor:pointer;}
@media(min-width:650px){.blog-grid{grid-template-columns:repeat(2,1fr);}.section-title{font-size:46px;}}
@media(min-width:950px){.blog-grid{grid-template-columns:repeat(3,1fr);gap:36px;}.blog-card{border:10px solid #111;box-shadow:16px 16px 0 var(--shadow);}.blog-thumb{height:200px;border-bottom:10px solid #111;}.section-title{font-size:52px;}}
@media(max-width:420px){.section-title{font-size:28px;padding:12px;}.blog-card h2{font-size:20px;}.excerpt{font-size:14px;}}
@media(max-width:600px){.floating{display:none;}}
</style>
<div class="floating shape1"></div>
<div class="floating shape2"></div>
<div class="floating shape3"></div>

<div class="container">
<h1 class="section-title">Blog</h1>
<input type="text" id="searchInput" placeholder="Search article..." class="search-box">

<div class="blog-grid" id="blogGrid">
{% for post in paginator.posts %}
<a href="{{ post.url }}" class="blog-card" data-title="{{ post.title | downcase }}" data-excerpt="{{ post.excerpt | strip_html | downcase }}">
{% if post.image %}<img src="{{ post.image }}" class="blog-thumb">{% else %}<img src="https://picsum.photos/600/400?random={{ forloop.index }}" class="blog-thumb">{% endif %}
<div class="blog-content">
<h2>{{ post.title }}</h2>
<p class="date">{{ post.date | date: "%d %b %Y" }}</p>
<p class="excerpt">{{ post.excerpt | strip_html | truncate:120 }}</p>
</div>
</a>
{% endfor %}
</div>

<div class="pagination" id="pagination"></div>
</div>

<div class="bottom-bar">
<button id="homeBtn">Home</button>
</div>
<script>
const homeBtn = document.getElementById("homeBtn")
homeBtn.onclick = ()=>{window.location.href="/"}

const blogGrid = document.getElementById("blogGrid")
const pagination = document.getElementById("pagination")
const searchInput = document.getElementById("searchInput")
const POSTS_PER_PAGE = 6
let allPosts = []
let currentPage = 1

// Fetch search.json
fetch("/blog/search.json")
.then(res=>res.json())
.then(data=>{
  allPosts = data
  renderPage()
})

function renderPage(page = 1){
  blogGrid.innerHTML = ""
  currentPage = page

  let filtered = allPosts

  const keyword = searchInput.value.toLowerCase()
  if(keyword) filtered = allPosts.filter(post=>{
    return post.title.toLowerCase().includes(keyword) || post.excerpt.toLowerCase().includes(keyword)
  })

  const totalPages = Math.ceil(filtered.length / POSTS_PER_PAGE)
  const start = (currentPage-1)*POSTS_PER_PAGE
  const end = start + POSTS_PER_PAGE
  const pagePosts = filtered.slice(start,end)

  if(pagePosts.length === 0){blogGrid.innerHTML="<p>No posts found</p>";pagination.innerHTML="";return}

  pagePosts.forEach(post=>{
    const card = document.createElement("a")
    card.href = post.url
    card.className = "blog-card"
    card.innerHTML = `
      <img src="${post.image}" class="blog-thumb">
      <div class="blog-content">
        <h2>${post.title}</h2>
        <p class="date">${post.date}</p>
        <p class="excerpt">${post.excerpt.substring(0,120)}</p>
      </div>
    `
    blogGrid.appendChild(card)
  })

  // Render pagination
  pagination.innerHTML = ""
  if(currentPage>1){
    const prev = document.createElement("a")
    prev.textContent="Prev"
    prev.onclick=()=>renderPage(currentPage-1)
    pagination.appendChild(prev)
  }

  for(let i=1;i<=totalPages;i++){
    const el = document.createElement(currentPage===i?"span":"a")
    el.textContent=i
    if(currentPage!==i) el.onclick=(()=>renderPage(i))
    el.className = currentPage===i?"current":""
    pagination.appendChild(el)
  }

  if(currentPage<totalPages){
    const next = document.createElement("a")
    next.textContent="Next"
    next.onclick=()=>renderPage(currentPage+1)
    pagination.appendChild(next)
  }
}

searchInput.addEventListener("input", ()=> renderPage(1))

// Floating shapes animation
const shapes = document.querySelectorAll(".floating")
setInterval(()=>{
  shapes.forEach(shape=>{
    const x=(Math.random()-0.5)*30
    const y=(Math.random()-0.5)*30
    const r=(Math.random()-0.5)*20
    shape.style.transform = `translate(${x}px,${y}px) rotate(${r}deg)`
  })
},4000)
</script>
