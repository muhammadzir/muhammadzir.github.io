---
layout: default
title: Blog Muhammad Zir
---

<link rel="stylesheet" href="/assets/blog.css">

<style>
:root{
  --yellow:#FFD500;--pink:#FF3CAC;--green:#29FF87;--blue:#3F6BFF;--orange:#FF7A00;--shadow:#000;--bg:#FFF6E9;
}
body{margin:0;padding:0;font-family:'Space Grotesk',sans-serif;background:var(--bg);overflow-x:hidden;}
h1,h2,h3,p{margin:0;padding:0;}
a{text-decoration:none;color:inherit;}
.blog-grid{display:flex;flex-wrap:wrap;gap:40px;justify-content:center;perspective:1000px;margin-top:40px;}
.blog-card{background:white;border:10px solid #111;padding:30px;box-shadow:16px 16px 0 var(--shadow);transition:.3s transform,.3s box-shadow;transform-style:preserve-3d;width:300px;}
.blog-card.magnetic{transition:transform .2s;}
.blog-card.magnetic:hover{transform:scale(1.03) rotate(-2deg); box-shadow: 20px 20px 0 var(--shadow);}
.blog-card h2{font-size:24px;margin-bottom:10px;background:var(--blue);padding:12px;border:6px solid #111;box-shadow:8px 8px 0 var(--shadow);transform:rotate(-2deg);display:inline-block;}
.blog-card .date{font-size:12px;font-weight:800;margin-bottom:10px;color:#555;}
.blog-card .excerpt{font-size:16px;}
section.blog-container{padding:80px 10%;position:relative;}
#cursor{width:22px;height:22px;border:3px solid #111;border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .05s linear;}
.floating-shape{position:absolute;border:6px solid #111;box-shadow:6px 6px 0 var(--shadow);border-radius:6px;opacity:.3;}
@media(max-width:768px){.blog-card{width:90%;padding:20px;}}
</style>

<section class="blog-container">
  <h1>Blog Muhammad Zir</h1>
  <div class="blog-grid">
    {% for post in site.posts %}
    <div class="blog-card magnetic">
      <a href="{{ post.url }}">
        <h2>{{ post.title }}</h2>
        <p class="date">{{ post.date | date: "%d %b %Y" }}</p>
        <p class="excerpt">{{ post.excerpt | strip_html | truncate: 120 }}</p>
      </a>
    </div>
    {% endfor %}
  </div>
</section>
<script>
(() => {
  // Cursor custom
  const cursor = document.createElement("div");
  cursor.id = "cursor";
  document.body.appendChild(cursor);
  document.addEventListener("mousemove", e => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
  });

  // Magnetic hover effect untuk card blog
  const cards = document.querySelectorAll(".blog-card.magnetic");
  cards.forEach(card => {
    card.addEventListener("mousemove", e => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left - rect.width/2;
      const y = e.clientY - rect.top - rect.height/2;
      card.style.transform = `rotateX(${-y/10}deg) rotateY(${x/10}deg) translateZ(0)`;
    });
    card.addEventListener("mouseleave", () => {
      card.style.transform = "";
    });
  });

  // Floating shapes dekoratif
  const shapesData = [
    {width:150,height:150,top:"5%",left:"5%",bg:"var(--orange)"},
    {width:100,height:100,top:"30%",left:"80%",bg:"var(--green)"},
    {width:120,height:120,top:"60%",left:"40%",bg:"var(--pink)"}
  ];
  shapesData.forEach((d,i)=>{
    const div = document.createElement("div");
    div.classList.add("floating-shape");
    div.style.width = d.width+"px";
    div.style.height = d.height+"px";
    div.style.top = d.top;
    div.style.left = d.left;
    div.style.background = d.bg;
    div.style.animationDuration = (20+i*5)+"s";
    document.body.appendChild(div);
  });

  const floatingShapes = document.querySelectorAll('.floating-shape');
  setInterval(()=>{
    floatingShapes.forEach(shape=>{
      const x = (Math.random()-0.5)*20;
      const y = (Math.random()-0.5)*20;
      const r = (Math.random()-0.5)*10;
      shape.style.transform = `translate(${x}px,${y}px) rotate(${r}deg)`;
    });
  },4000);
})();
</script>
