<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Muhammad Zir</title>
<link rel="icon" href="https://zir.is-a.dev/img/IMG_20260304_195738_807.webp" type="image/webp">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --yellow:#FFD500;--pink:#FF3CAC;--green:#29FF87;--blue:#3F6BFF;--orange:#FF7A00;--shadow:#000;--bg:#FFF6E9;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Space Grotesk',sans-serif;cursor:none}
html, body {height: 100%;margin: 0;display: flex;flex-direction: column;}
body{background:var(--bg);overflow-x:hidden;position:relative;padding-bottom:70px;}
body > *:not(.bottom-bar):not(.floating-shape):not(.floating-icon){flex:1 0 auto;}
.cursor{width:22px;height:22px;border:3px solid #111;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .05s linear}

.blog-grid{display:flex;flex-wrap:wrap;gap:40px;margin-top:40px;}
.blog-card{flex:1 1 100%;background:white;border:10px solid #111;padding:30px;box-shadow:16px 16px 0 var(--shadow);transition:.3s transform,.3s box-shadow;transform-style:preserve-3d;text-decoration:none;color:#111}
.blog-card h2{margin-bottom:12px;font-size:28px;}
.blog-card .date{font-size:14px;margin-bottom:8px;font-weight:800;color:#555;}
.blog-card .excerpt{font-size:16px;line-height:1.4;color:#333;}
.blog-card a{text-decoration:none;color:inherit;display:block;}

.section-title{font-size:42px;margin-bottom:60px;background:var(--orange);padding:18px;border:10px solid #111;box-shadow:14px 14px 0 var(--shadow);transform:rotate(-3deg);display:inline-block}

/* Bottom Bar */
.bottom-bar {
  position: fixed;
  bottom:0;
  left:0;
  width:100%;
  display: flex;
  justify-content: flex-start; /* kiri */
  align-items: center;
  z-index: 1200;
  background: var(--yellow);
  padding: 6px 0;
  border-top: 6px solid #111;
  box-shadow: 0 -6px 0 var(--shadow);
}
.bottom-bar button {
  padding: 6px 8px;
  font-weight: 800;
  background: var(--pink);
  border: 4px solid #111;
  box-shadow: 4px 4px 0 var(--shadow);
  transform: rotate(-2deg);
  cursor: pointer;
  transition: transform .15s;
  font-size:12px;
}
.bottom-bar button:hover {
  transform: rotate(2deg) translate(-4px,-4px);
}
.bottom-bar button.active {
  background: var(--green);
  transform: rotate(0deg) translateY(-2px);
  box-shadow: 6px 6px 0 var(--shadow);
}

/* Floating shapes & icons */
.floating-shape{position:absolute;border:6px solid #111;box-shadow:6px 6px 0 var(--shadow);border-radius:6px;opacity:.5;animation:floatShape linear infinite}
.floating-shape.shape1{width:150px;height:150px;top:10%;left:10%;background:var(--orange);animation-duration:20s}
.floating-shape.shape2{width:100px;height:100px;top:40%;left:70%;background:var(--green);animation-duration:25s}
.floating-shape.shape3{width:120px;height:120px;top:70%;left:30%;background:var(--pink);animation-duration:18s}
@keyframes floatShape{0%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(15px,-15px) rotate(45deg)}100%{transform:translate(-15px,15px) rotate(0deg)}}

.floating-icon{position:absolute;width:32px;height:32px;border-radius:50%;border:4px solid #111;box-shadow:6px 6px 0 var(--shadow);animation:floatAnim 8s infinite alternate ease-in-out;z-index:0;opacity:0.4;}
.floating-icon.shape1{width:32px;height:32px;top:5%;left:5%;background:var(--orange);}
.floating-icon.shape2{top:80%;left:10%;background:var(--green);}
.floating-icon.shape3{top:10%;right:5%;background:var(--pink);}
.floating-icon.shape4{top:75%;right:15%;background:var(--blue);}
.floating-icon.shape5{bottom:5%;left:50%;background:var(--yellow);}
@keyframes floatAnim{0%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(15px,-15px) rotate(15deg)}100%{transform:translate(-15px,15px) rotate(-15deg)}}

@media(max-width:768px){
  .blog-card{padding:20px;font-size:14px;}
  .blog-grid{gap:20px;}
  .bottom-bar button{padding:4px 6px;font-size:10px;}
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="floating-shape shape1"></div>
<div class="floating-shape shape2"></div>
<div class="floating-shape shape3"></div>
<div class="floating-icon shape1"></div>
<div class="floating-icon shape2"></div>
<div class="floating-icon shape3"></div>
<div class="floating-icon shape4"></div>
<div class="floating-icon shape5"></div>

<section id="blog">
  <div class="section-title">Blog Muhammad Zir</div>
  <div class="blog-grid" id="blog-grid"></div>
</section>

<div class="bottom-bar">
  <button id="btn-home">Home</button>
</div>
<script>
(() => {
  // Cursor custom
  const cursor = document.getElementById("cursor");
  document.addEventListener("mousemove", e => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
  });

  // Floating shapes random movement
  const floatingShapes = document.querySelectorAll('.floating-shape, .floating-icon');
  setInterval(()=>{
    floatingShapes.forEach(shape=>{
      const x = (Math.random()-0.5)*20;
      const y = (Math.random()-0.5)*20;
      const r = (Math.random()-0.5)*10;
      shape.style.transform = `translate(${x}px,${y}px) rotate(${r}deg)`;
    });
  },4000);

  // Fetch posts.json dan render
  const blogGrid = document.getElementById('blog-grid');
  fetch('/blog/posts.json')
    .then(res => res.json())
    .then(posts => {
      posts.forEach(post => {
        const card = document.createElement('a');
        card.href = `/blog/${post.file}`;
        card.className = 'blog-card magnetic';
        card.innerHTML = `
          <h2>${post.title}</h2>
          <p class="date">${new Date(post.date).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}</p>
          <p class="excerpt">${post.excerpt}</p>
        `;
        blogGrid.appendChild(card);
      });

      // Magnetic effect on cards
      const cards = document.querySelectorAll(".blog-card.magnetic");
      cards.forEach(card=>{
        card.addEventListener("mousemove", e=>{
          const rect = card.getBoundingClientRect();
          const x = e.clientX - rect.left - rect.width/2;
          const y = e.clientY - rect.top - rect.height/2;
          card.style.transform = `rotateX(${-y/10}deg) rotateY(${x/10}deg) translateZ(0)`;
        });
        card.addEventListener("mouseleave",()=>{card.style.transform=""});
      });
    });

  // Bottom bar button back to index
  const btnHome = document.getElementById('btn-home');
  btnHome.addEventListener('click', ()=>{
    window.location.href = '/';
  });

})();
</script>
</body>
</html>
