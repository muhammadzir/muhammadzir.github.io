---
layout: null
title: Blog
permalink: /blog/
---

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--yellow:#FFD500;
--pink:#FF3CAC;
--green:#29FF87;
--orange:#FF7A00;
--shadow:#000;
--bg:#FFF6E9;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Space Grotesk',sans-serif;
}

body{
background:var(--bg);
overflow-x:hidden;
padding:30px 16px 100px;
}

/* container */

.container{
max-width:1000px;
margin:auto;
width:100%;
}

/* title */

.section-title{
font-size:38px;
margin-bottom:40px;
background:var(--orange);
padding:16px 20px;
border:8px solid #111;
box-shadow:10px 10px 0 var(--shadow);
transform:rotate(-2deg);
display:inline-block;
}

/* grid */

.blog-grid{
display:grid;
grid-template-columns:1fr;
gap:24px;
}

/* card */

.blog-card{
display:block;
background:white;
border:6px solid #111;
padding:20px;
box-shadow:8px 8px 0 var(--shadow);
text-decoration:none;
color:#111;
transition:.2s;
}

.blog-card:hover{
transform:translate(-4px,-4px);
box-shadow:12px 12px 0 var(--shadow);
}

.blog-card h2{
font-size:22px;
margin-bottom:8px;
}

.date{
font-size:13px;
font-weight:700;
margin-bottom:6px;
}

.excerpt{
font-size:15px;
line-height:1.5;
}

/* floating shapes */

.floating{
position:absolute;
border:5px solid #111;
box-shadow:6px 6px 0 var(--shadow);
opacity:.3;
}

.shape1{
width:100px;
height:100px;
background:var(--green);
top:10%;
left:5%;
}

.shape2{
width:80px;
height:80px;
background:var(--pink);
bottom:20%;
right:10%;
}

/* bottom bar */

.bottom-bar{
position:fixed;
bottom:0;
left:0;
width:100%;
background:var(--yellow);
border-top:5px solid #111;
display:flex;
justify-content:center;
padding:8px;
}

.bottom-bar button{
background:var(--pink);
border:4px solid #111;
padding:6px 14px;
font-weight:700;
box-shadow:4px 4px 0 var(--shadow);
}

/* tablet */

@media(min-width:600px){

.section-title{
font-size:42px;
}

.blog-grid{
grid-template-columns:repeat(2,1fr);
}

.blog-card{
padding:24px;
}

}

/* desktop */

@media(min-width:900px){

.blog-grid{
grid-template-columns:repeat(2,1fr);
gap:32px;
}

.blog-card{
border:10px solid #111;
box-shadow:14px 14px 0 var(--shadow);
padding:28px;
}

.blog-card h2{
font-size:26px;
}

.section-title{
font-size:48px;
padding:18px 24px;
}

}

/* extra small phones */

@media(max-width:400px){

.section-title{
font-size:28px;
padding:12px;
}

.blog-card h2{
font-size:18px;
}

.excerpt{
font-size:13px;
}

}

/* hide shapes on very small screen */

@media(max-width:600px){

.floating{
display:none;
}

}

</style>


<div class="floating shape1"></div>
<div class="floating shape2"></div>

<div class="container">

<h1 class="section-title">Blog</h1>

<div class="blog-grid">

{% for post in site.posts %}

<a href="{{ post.url }}" class="blog-card">
<h2>{{ post.title }}</h2>

<p class="date">
{{ post.date | date: "%d %b %Y" }}
</p>

<p class="excerpt">
{{ post.excerpt | strip_html | truncate:120 }}
</p>

</a>

{% endfor %}

</div>

</div>

<div class="bottom-bar">
<button onclick="window.location.href='/'">Home</button>
</div>
