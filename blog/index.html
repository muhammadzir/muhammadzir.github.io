---
layout: default
title: Blog Muhammad Zir
---

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">

<style>
:root{
  --yellow:#FFD500;--pink:#FF3CAC;--green:#29FF87;--blue:#3F6BFF;--orange:#FF7A00;--shadow:#000;--bg:#FFF6E9;
}
body{
  font-family:'Space Grotesk',sans-serif;
  background:var(--bg);
  margin:0;
  padding:80px 10px;
}
h1{
  font-size:70px;
  font-weight:800;
  background:var(--blue);
  padding:25px;
  border:12px solid #111;
  box-shadow:18px 18px 0 var(--shadow);
  transform:rotate(-4deg);
  display:inline-block;
  margin-bottom:50px;
}
.blog-grid{
  display:flex;
  flex-wrap:wrap;
  gap:40px;
  perspective:1000px;
}
.blog-card{
  flex:1 1 100%;
  background:white;
  border:10px solid #111;
  padding:30px;
  box-shadow:16px 16px 0 var(--shadow);
  transition:.3s transform,.3s box-shadow;
  transform-style:preserve-3d;
}
.blog-card.magnetic:hover{
  transform: scale(1.03) rotate(-2deg);
  box-shadow: 20px 20px 0 var(--shadow);
}
.blog-card h2{
  font-size:32px;
  font-weight:800;
  background:var(--blue);
  padding:12px 20px;
  border:8px solid #111;
  box-shadow:12px 12px 0 var(--shadow);
  transform:rotate(-3deg);
  display:inline-block;
  margin-bottom:12px;
}
.blog-card .date{
  font-size:14px;
  font-weight:800;
  background:var(--yellow);
  padding:6px 10px;
  border:6px solid #111;
  box-shadow:6px 6px 0 var(--shadow);
  display:inline-block;
  margin-bottom:20px;
}
.blog-card .excerpt{
  font-size:18px;
  line-height:1.5;
}
@media(max-width:768px){
  h1{font-size:42px}
  .blog-card{padding:20px}
  .blog-card h2{font-size:24px;padding:8px 16px;border:6px solid #111;box-shadow:8px 8px 0 var(--shadow)}
  .blog-card .date{padding:4px 6px;border:4px solid #111;box-shadow:4px 4px 0 var(--shadow)}
  .blog-card .excerpt{font-size:16px}
}
</style>

<h1>Blog Muhammad Zir</h1>
<div class="blog-grid">
  {% for post in site.posts %}
  <div class="blog-card magnetic">
    <a href="{{ post.url }}">
      <h2>{{ post.title }}</h2>
      <p class="date">{{ post.date | date: "%d %b %Y" }}</p>
      <p class="excerpt">{{ post.excerpt | strip_html | truncate: 120 }}</p>
    </a>
  </div>
  {% endfor %}
</div>
<script>
(() => {
  // Cursor custom
  const cursor = document.createElement('div');
  cursor.id = 'cursor';
  cursor.style.width='22px';
  cursor.style.height='22px';
  cursor.style.border='3px solid #111';
  cursor.style.borderRadius='50%';
  cursor.style.position='fixed';
  cursor.style.pointerEvents='none';
  cursor.style.zIndex='9999';
  cursor.style.transform='translate(-50%,-50%)';
  cursor.style.transition='transform .05s linear';
  document.body.appendChild(cursor);
  document.addEventListener("mousemove", e => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
  });

  // Card magnetic 3D hover
  const cards = document.querySelectorAll(".blog-card.magnetic");
  cards.forEach(card=>{
    card.addEventListener("mousemove", e=>{
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left - rect.width/2;
      const y = e.clientY - rect.top - rect.height/2;
      card.style.transform = `rotateX(${-y/10}deg) rotateY(${x/10}deg) translateZ(0)`;
    });
    card.addEventListener("mouseleave", ()=>{
      card.style.transform = '';
    });
  });

  // Optional: floating shapes behind blog cards
  const shapes = [];
  for(let i=0;i<3;i++){
    const shape = document.createElement('div');
    shape.className='floating-shape';
    shape.style.width = (100+i*30)+'px';
    shape.style.height = (100+i*30)+'px';
    shape.style.background = ['#FF7A00','#29FF87','#FF3CAC'][i];
    shape.style.position='absolute';
    shape.style.top = (10+i*30)+'%';
    shape.style.left = (10+i*30)+'%';
    shape.style.border='6px solid #111';
    shape.style.boxShadow='6px 6px 0 #000';
    shape.style.borderRadius='6px';
    shape.style.opacity='0.3';
    shape.style.zIndex='-1';
    document.body.appendChild(shape);
    shapes.push(shape);
  }

  setInterval(()=>{
    shapes.forEach(shape=>{
      const x=(Math.random()-0.5)*20;
      const y=(Math.random()-0.5)*20;
      const r=(Math.random()-0.5)*10;
      shape.style.transform=`translate(${x}px,${y}px) rotate(${r}deg)`;
    });
  },4000);

})();
</script>
