<meta name="description" content="{{ page.excerpt | strip_html | truncate:160 | default: site.description }}">
<meta name="author" content="{{ site.title }}">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website">
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.excerpt | strip_html | truncate:160 | default: site.description }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:image" content="{% if page.image %}{{ page.image | absolute_url }}{% else %}{{ '/assets/default-thumbnail.webp' | absolute_url }}{% endif %}">

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title | default: site.title }}">
<meta name="twitter:description" content="{{ page.excerpt | strip_html | truncate:160 | default: site.description }}">
<meta name="twitter:image" content="{% if page.image %}{{ page.image | absolute_url }}{% else %}{{ '/assets/default-thumbnail.webp' | absolute_url }}{% endif %}">

<!-- Canonical -->
<link rel="canonical" href="{{ page.url | absolute_url }}">
