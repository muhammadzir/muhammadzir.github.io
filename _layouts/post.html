<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ page.title }} | Zir Blog</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">

<style>

:root{
--yellow:#FFD500;
--pink:#FF3CAC;
--orange:#FF7A00;
--bg:#FFF6E9;
--shadow:#000;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Space Grotesk',sans-serif;
}

body{
background:var(--bg);
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.title{
font-size:40px;
background:var(--orange);
padding:16px;
border:8px solid #111;
box-shadow:10px 10px 0 var(--shadow);
transform:rotate(-2deg);
display:inline-block;
margin-bottom:20px;
}

.date{
font-weight:800;
margin-bottom:20px;
}

.post-box{
background:white;
border:8px solid #111;
padding:30px;
box-shadow:10px 10px 0 var(--shadow);
line-height:1.7;
font-size:18px;
}

.back{
margin-top:30px;
display:inline-block;
background:var(--pink);
padding:10px 16px;
border:4px solid #111;
box-shadow:4px 4px 0 var(--shadow);
text-decoration:none;
color:#111;
font-weight:800;
}

@media(max-width:768px){

.title{
font-size:28px;
border:6px solid #111;
}

.post-box{
padding:20px;
font-size:16px;
}

}

</style>
</head>

<body>

<div class="container">

<h1 class="title">{{ page.title }}</h1>

<p class="date">
{{ page.date | date: "%d %B %Y" }}
</p>

<div class="post-box">
{{ content }}
</div>

<a class="back" href="/blog">← Back to blog</a>

</div>

</body>
</html>
