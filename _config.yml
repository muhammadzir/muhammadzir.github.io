# _config.yml
title: "Zir"
description: "Personal blog"
url: "https://zir.is-a.dev"
baseurl: ""       # jangan pakai "/blog", biar permalink tidak dobel

theme: minima

plugins:
  - jekyll-paginate
  - jekyll-feed
  - jekyll-seo-tag

paginate: 6
paginate_path: "/blog/page:num/"
permalink: /blog/:title/   # cukup ini, tanpa folder tambahan
