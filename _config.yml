title: "Zir"
description: "Personal blog"
url: "https://zir.is-a.dev"
baseurl: ""  # jangan ubah jika pakai domain utama

theme: minima

plugins:
  - jekyll-paginate
  - jekyll-feed
  - jekyll-seo-tag

paginate: 6
paginate_path: "/blog/page:num/"

# semua post otomatis punya permalink di /blog/:title/
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      permalink: "/blog/:title/"
