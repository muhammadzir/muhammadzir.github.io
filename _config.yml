# _config.yml
title: "Zir"
description: "Personal blog"
url: "https://zir.is-a.dev"
baseurl: ""  # tetap kosong jika di root domain

theme: minima

plugins:
  - jekyll-paginate
  - jekyll-feed
  - jekyll-seo-tag

# Pagination
paginate: 6
paginate_path: "/blog/page:num/"

# Permalink untuk posts agar URL /blog/post-title
collections:
  posts:
    output: true
    permalink: /blog/:title/

# Defaults agar SEO tag otomatis pakai data post
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      seo:
        title: "{{ page.title }}"
        description: "{{ page.excerpt | strip_html | truncate:160 }}"
        image: "{{ page.image }}"
